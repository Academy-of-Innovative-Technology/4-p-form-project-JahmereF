<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameCon 2026 Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form id="registrationForm">
        <h1>GameCon 2026</h1>
        <p>Register to secure your spot!</p>
        
        <fieldset>
            <legend>Account Details</legend>
            
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </fieldset>

        <fieldset>
            <legend>Preferences</legend>
            
            <label>Primary Platform:</label>
            <div class="radio-group">
                <input type="radio" id="pc" name="platform" value="pc" checked>
                <label for="pc">PC</label>
                
                <input type="radio" id="console" name="platform" value="console">
                <label for="console">Console</label>
            </div>

            <label for="favGame">Favorite Game Type:</label>
            <input type="text" id="favGame" name="favGame" list="gameGenres" placeholder="Start typing..." required>
            <datalist id="gameGenres">
                <option value="RPG">
                <option value="FPS">
                <option value="Strategy">
                <option value="MMO">
            </datalist>

            <label>
                <input type="checkbox" name="newsletter" value="subscribed"> 
                Subscribe to our newsletter
            </label>
        </fieldset>

        <input type="submit" value="Register Now">
    </form>

    <script src="script.js"></script>
</body>
</html>
